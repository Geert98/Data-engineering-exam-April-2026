project:
  name: electronics_price_pressure

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  db_dir: data/db
  model_dir: artifacts/models
  metrics_dir: artifacts/metrics
  predictions_dir: artifacts/predictions

fred:
  series_id: PCU33443344
  url_template: "https://fred.stlouisfed.org/graph/fredgraph.csv?id={series_id}"
  indicators:
    - source: ny_fed_gscpi
      name: gscpi
      url: "https://www.newyorkfed.org/medialibrary/research/interactives/gscpi/downloads/gscpi_data.xlsx"
    - series_id: DCOILWTICO
      name: wti_oil_price

storage:
  mongo:
    uri: "mongodb://localhost:27017"
    database: electronics_price_pressure
    raw_news_collection: raw_news
    clean_news_collection: clean_news
  sqlite:
    fred_db_path: data/db/fred.sqlite3

news:
  use_gdelt: false
  use_guardian: true
  use_newsapi: true
  use_newsdata: false
  start_date: "2023-01-01"
  end_date: today
  query: '((semiconductor OR microchip OR chips OR DRAM OR NAND OR SSD OR memory) AND (price OR prices OR shortage OR tariff OR supply OR demand OR "export controls"))'
  max_records_per_window: 50
  window: monthly
  sleep_seconds: 5
  max_retries: 3
  retry_base_sleep: 3
  guardian:
    api_key_env: GUARDIAN_API_KEY
    order_by: newest
    show_fields: trailText,thumbnail
    min_request_interval_seconds: 1.2
    max_pages_per_window: 3
  newsapi:
    api_key_env: NEWSAPI_KEY
    endpoint: everything
    lookback_days: 30
    language: en
    sort_by: publishedAt
    min_request_interval_seconds: 1.2
    max_pages: 1
  newsdata:
    api_key_env: NEWSDATA_API_KEY
    endpoint: archive
    language: en
    min_request_interval_seconds: 31

features:
  keywords:
    - semiconductor
    - supply chain
    - shortage
    - tariff
    - memory
    - nand
    - dram
    - ssd
    - ram
    - electronics
    - ai demand

target:
  low_quantile: 0.33
  high_quantile: 0.67

model:
  test_size_months: 12
  random_state: 42
  candidates:
    - logistic_regression
    - gradient_boosting
  selection_metric: macro_f1
