project:
  name: electronics_price_pressure

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  db_dir: data/db
  model_dir: artifacts/models
  metrics_dir: artifacts/metrics
  predictions_dir: artifacts/predictions

fred:
  series_id: PCU33443344
  url_template: "https://fred.stlouisfed.org/graph/fredgraph.csv?id={series_id}"

storage:
  mongo:
    uri: "mongodb://localhost:27017"
    database: electronics_price_pressure
    raw_news_collection: raw_news
    clean_news_collection: clean_news
  sqlite:
    fred_db_path: data/db/fred.sqlite3

news:
  use_gdelt: false
  use_guardian: true
  use_newsdata: false
  start_date: "2024-01-01"
  end_date: "2026-03-31"
  query: '((semiconductor OR DRAM OR NAND OR SSD) AND (price OR shortage OR tariff OR supply))'
  max_records_per_window: 25
  window: monthly
  sleep_seconds: 1.2
  max_retries: 3
  retry_base_sleep: 3
  guardian:
    api_key_env: GUARDIAN_API_KEY
    order_by: newest
    show_fields: trailText,thumbnail
    min_request_interval_seconds: 1.2
  newsdata:
    api_key_env: NEWSDATA_API_KEY
    endpoint: archive
    language: en
    min_request_interval_seconds: 31

features:
  keywords:
    - semiconductor
    - supply chain
    - shortage
    - tariff
    - memory
    - nand
    - dram
    - ssd
    - ram
    - electronics
    - ai demand

target:
  low_quantile: 0.33
  high_quantile: 0.67

model:
  test_size_months: 12
  random_state: 42
